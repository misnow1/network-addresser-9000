name: Codex PR review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":workspace"
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }} in
            network-addresser-9000, a Django app that tracks IP address assignments for
            network equipment (VLANs, racks, switches, devices).

            Before reviewing, read DESIGN.md, CONTEXT.md, docs/adr/*.md, and ROADMAP.md
            for this project's domain model, terminology, and architectural decisions.
            Flag anything in the diff that contradicts them.

            Review the diff between ${{ github.event.pull_request.base.sha }} and
            ${{ github.event.pull_request.head.sha }} for:
            - Correctness bugs and missing edge cases
            - Security issues (secrets handling, injection, auth/permissions)
            - Schema/data-integrity gaps (constraints, validation, migrations)
            - Missing test coverage for new logic
            - Consistency with this repo's existing conventions

            Post a concise, actionable review as separate inline comments where possible.
            Skip nitpicks. If a prior review already covered a point and it's since been
            fixed, don't re-raise it. If everything looks good, say so briefly.

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            })
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
